<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock Signing Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "72", "72full", Arial, sans-serif;
            background: #f5f6f7;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12);
            padding: 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .icon { font-size: 48px; margin-bottom: 16px; }

        h1 {
            font-size: 20px;
            font-weight: 700;
            color: #32363a;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: #6a6d70;
            margin-bottom: 32px;
        }

        .info-box {
            background: #f5f6f7;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 32px;
            text-align: left;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 4px 0;
        }

        .info-label { color: #6a6d70; }
        .info-value { color: #32363a; font-weight: 600; word-break: break-all; }

        .btn {
            display: inline-block;
            padding: 12px 32px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background 0.15s;
        }

        .btn-sign {
            background: #0070f2;
            color: #fff;
            width: 100%;
            margin-bottom: 12px;
        }
        .btn-sign:hover { background: #0064d9; }

        .btn-decline {
            background: transparent;
            color: #bf0000;
            border: 1px solid #bf0000;
            width: 100%;
        }
        .btn-decline:hover { background: #fff0f0; }

        .mock-badge {
            display: inline-block;
            background: #e8f3ff;
            color: #0070f2;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 10px;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="mock-badge">MOCK SIGNING PORTAL</div>
    <div class="icon">✍️</div>
    <h1>Document Signature Required</h1>
    <p class="subtitle">Please review and sign the document below</p>

    <div class="info-box">
        <div class="info-row">
            <span class="info-label">File</span>
            <span class="info-value" id="fileName">—</span>
        </div>
        <div class="info-row">
            <span class="info-label">Portfolio ID</span>
            <span class="info-value" id="portfolioId">—</span>
        </div>
        <div class="info-row">
            <span class="info-label">Attachment ID</span>
            <span class="info-value" id="attachmentId">—</span>
        </div>
    </div>

    <button class="btn btn-sign" onclick="completeSigning()">✅ Complete Signing</button>
    <button class="btn btn-decline" onclick="declineSigning()">✗ Decline</button>
</div>

<script>
    // Read URL params
    const params       = new URLSearchParams(window.location.search);
    const portfolioId  = params.get('portfolioId')  || 'N/A';
    const attachmentId = params.get('attachmentId') || 'N/A';
    const fileName     = params.get('fileName')     || 'N/A';
    const redirectUrl  = params.get('redirectUrl')  || '/';
    const declineUrl   = params.get('redirectDeclineUrl') || '/';

    // Populate info
    document.getElementById('portfolioId').textContent  = portfolioId;
    document.getElementById('attachmentId').textContent = attachmentId;
    document.getElementById('fileName').textContent     = decodeURIComponent(fileName);

    function completeSigning() {
        const url = redirectUrl
            + (redirectUrl.includes('?') ? '&' : '?')
            + 'signed=true'
            + '&portfolioId=' + encodeURIComponent(portfolioId)
            + '&attachmentId=' + encodeURIComponent(attachmentId);

        console.log('[MockSigning] Redirecting to:', url);
        window.location.href = url;
    }

    function declineSigning() {
        const url = declineUrl
            + (declineUrl.includes('?') ? '&' : '?')
            + 'signed=false'
            + '&portfolioId=' + encodeURIComponent(portfolioId)
            + '&attachmentId=' + encodeURIComponent(attachmentId);

        console.log('[MockSigning] Declined, redirecting to:', url);
        window.location.href = url;
    }
</script>
</body>
</html>
